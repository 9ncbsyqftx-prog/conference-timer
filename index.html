<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="学会タイマー">
<title>学会タイマー</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='31' fill='%2312151c' stroke='%234fc3f7' stroke-width='2'/%3E%3Cg stroke='%234a5270' stroke-width='1.5' stroke-linecap='round'%3E%3Cline x1='32' y1='4' x2='32' y2='11'/%3E%3Cline x1='32' y1='53' x2='32' y2='60'/%3E%3Cline x1='4' y1='32' x2='11' y2='32'/%3E%3Cline x1='53' y1='32' x2='60' y2='32'/%3E%3C/g%3E%3Cline x1='32' y1='32' x2='19' y2='18' stroke='%23ccd6f6' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='32' y1='32' x2='32' y2='12' stroke='%234fc3f7' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='32' y1='32' x2='40' y2='45' stroke='%23ff4c4c' stroke-width='1.5' stroke-linecap='round'/%3E%3Ccircle cx='32' cy='32' r='3' fill='%234fc3f7'/%3E%3Crect x='22' y='52' width='20' height='3.5' rx='1.5' fill='%234fc3f7' opacity='.7'/%3E%3Crect x='27' y='55.5' width='10' height='2.5' rx='1' fill='%234fc3f7' opacity='.45'/%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap');
  :root {
    --bg:#0a0c10; --surface:#12151c; --border:#1e2330;
    --text-dim:#4a5270; --text-mid:#8892b0; --text-main:#ccd6f6;
    --accent:#4fc3f7; --accent-dim:rgba(79,195,247,.12);
    --warning:#ffd600; --warning-bg:rgba(255,214,0,.07);
    --danger:#ff4c4c; --danger-bg:rgba(255,76,76,.07);
    --radius:12px; --tr:0.3s cubic-bezier(.4,0,.2,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;background:var(--bg);color:var(--text-main);
    font-family:'Noto Sans JP',sans-serif;overflow:hidden;
    -webkit-user-select:none;user-select:none;}
  body::before{content:'';position:fixed;inset:0;
    background-image:linear-gradient(var(--border) 1px,transparent 1px),
      linear-gradient(90deg,var(--border) 1px,transparent 1px);
    background-size:48px 48px;opacity:.35;pointer-events:none;}

  /* SYNC BAR */
  #sync-bar{position:fixed;top:0;left:0;right:0;z-index:100;height:28px;
    display:flex;align-items:center;justify-content:space-between;padding:0 14px;
    background:rgba(10,12,16,.92);border-bottom:1px solid var(--border);
    font-size:10px;letter-spacing:.1em;}
  #sync-status{display:flex;align-items:center;gap:6px;color:var(--text-dim);}
  #sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim);transition:background .4s;}
  #sync-dot.connected{background:#4caf50;box-shadow:0 0 6px rgba(76,175,80,.6);}
  #sync-dot.syncing{background:var(--warning);animation:blink .6s ease-in-out infinite;}
  #sync-dot.error{background:var(--danger);}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  #room-info{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;color:var(--text-dim);}
  #room-id-display{color:var(--accent);font-size:11px;}

  /* 現在時刻 */
  #current-clock{position:fixed;top:36px;left:14px;z-index:50;
    font-family:'DM Mono',monospace;font-size:39px;font-weight:300;
    color:var(--text-dim);letter-spacing:.04em;}

  /* LAYOUT */
  #app{position:relative;z-index:1;width:100%;height:100%;display:flex;
    padding-top:28px;
    padding-left:env(safe-area-inset-left,0px);
    padding-right:env(safe-area-inset-right,0px);
    padding-bottom:env(safe-area-inset-bottom,0px);}
  @media(orientation:portrait){
    #app{flex-direction:column;align-items:center;justify-content:center;gap:14px;padding-left:20px;padding-right:20px;}
    #setup-panel{width:100%;display:flex;flex-direction:column;gap:10px;}
    #running-panel{width:100%;display:flex;flex-direction:column;align-items:center;gap:16px;}
    .time-display{font-size:clamp(100px,28vw,160px);}
    .run-btns{width:100%;display:flex;gap:10px;}
    .run-btn{flex:1;}
  }
  @media(orientation:landscape){
    #app{flex-direction:row;align-items:stretch;gap:0;padding-left:0;padding-right:0;}
    #setup-panel{width:340px;min-width:300px;display:flex;flex-direction:column;gap:10px;
      padding:16px 20px;border-right:1px solid var(--border);overflow-y:auto;}
    #running-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:20px;}
    .time-display{font-size:clamp(100px,20vw,220px);}
    .run-btns{display:flex;gap:14px;}
    .run-btn{min-width:160px;}
  }

  /* TIMER CARD */
  #timer-card{display:flex;flex-direction:column;align-items:center;gap:10px;
    background:var(--surface);border:1px solid var(--border);border-radius:20px;
    padding:32px 28px 24px;width:100%;max-width:520px;position:relative;overflow:hidden;
    transition:background var(--tr),border-color var(--tr);}
  #timer-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(79,195,247,.4),transparent);}
  #timer-card.warning{background:var(--warning-bg);border-color:rgba(255,214,0,.25);}
  #timer-card.warning::before{background:linear-gradient(90deg,transparent,rgba(255,214,0,.5),transparent);}
  #timer-card.danger{background:var(--danger-bg);border-color:rgba(255,76,76,.3);}
  #timer-card.danger::before{background:linear-gradient(90deg,transparent,rgba(255,76,76,.6),transparent);}
  @media(orientation:landscape){
    #timer-card{border:none;border-radius:0;background:transparent;padding:0;max-width:none;}
    #timer-card::before{display:none;}
    #timer-card.warning,#timer-card.danger{background:transparent;border:none;}
  }
  .overtime-label{font-size:10px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;
    color:var(--danger);opacity:0;transition:opacity .3s;height:13px;}
  .overtime-label.visible{opacity:1;}
  .time-display{font-family:'DM Mono',monospace;font-weight:300;letter-spacing:-.02em;
    line-height:1;color:#ccd6f6;transition:color var(--tr);text-align:center;}
  .time-display.warning{color:var(--warning);}
  .time-display.danger{color:var(--danger);animation:flash-text 1s ease-in-out infinite;}
  @keyframes flash-text{0%,100%{opacity:1}50%{opacity:.25}}
  #danger-overlay{position:fixed;inset:0;z-index:0;
    background:radial-gradient(ellipse at center,rgba(255,40,40,.28) 0%,rgba(180,0,0,.18) 60%,transparent 100%);
    opacity:0;pointer-events:none;}
  #danger-overlay.active{animation:flash-bg 1s ease-in-out infinite;}
  @keyframes flash-bg{0%,100%{opacity:0}50%{opacity:1}}
  .progress-bar{width:100%;height:4px;background:var(--border);border-radius:4px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:4px;background:var(--accent);
    transition:width .8s linear,background var(--tr);}
  .progress-fill.warning{background:var(--warning);}
  .progress-fill.danger{background:var(--danger);}
  .set-time-label{font-size:11px;color:var(--text-dim);letter-spacing:.06em;font-family:'DM Mono',monospace;}
  #mode-indicator{font-size:11px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--accent);background:var(--accent-dim);border:1px solid rgba(79,195,247,.2);
    padding:4px 12px;border-radius:20px;}
  .run-btn{padding:15px 0;font-size:14px;font-weight:500;font-family:'Noto Sans JP',sans-serif;
    border-radius:var(--radius);cursor:pointer;transition:var(--tr);letter-spacing:.04em;
    border:1px solid var(--border);text-align:center;}
  #btn-pause-run{background:rgba(255,214,0,.1);color:var(--warning);border-color:rgba(255,214,0,.3);}
  #btn-pause-run.paused{background:rgba(79,195,247,.12);color:var(--accent);border-color:rgba(79,195,247,.3);}
  #btn-reset-run{background:var(--surface);color:var(--text-mid);flex:0 0 auto;padding:15px 24px;}
  #room-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:.1em;}
  #room-id-running{color:var(--accent);}

  /* SETUP */
  .section-label{font-size:10px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--text-dim);font-weight:500;padding:2px 0;}
  .mode-toggle{display:flex;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:4px;gap:4px;}
  .mode-btn{flex:1;padding:9px;font-size:12px;font-weight:500;letter-spacing:.06em;
    font-family:'Noto Sans JP',sans-serif;background:transparent;color:var(--text-dim);
    border:none;border-radius:8px;cursor:pointer;transition:var(--tr);}
  .mode-btn.active{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(79,195,247,.2);}
  .time-setter{background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:14px;display:flex;flex-direction:column;gap:10px;}
  .time-inputs{display:flex;align-items:center;gap:8px;}
  .time-unit{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;}
  .unit-label{font-size:10px;color:var(--text-dim);letter-spacing:.1em;}
  .unit-controls{display:flex;flex-direction:column;align-items:center;gap:3px;width:100%;}
  .unit-btn{width:100%;height:30px;background:var(--bg);border:1px solid var(--border);
    border-radius:8px;color:var(--text-mid);font-size:14px;cursor:pointer;transition:var(--tr);
    display:flex;align-items:center;justify-content:center;}
  .unit-value{font-family:'DM Mono',monospace;font-size:26px;font-weight:400;color:var(--text-main);
    width:100%;text-align:center;background:var(--bg);border:1px solid var(--border);
    border-radius:8px;padding:7px 0;cursor:text;-webkit-user-select:auto;user-select:auto;}
  .unit-value:focus{outline:none;border-color:var(--accent);color:var(--accent);}
  .time-sep{font-family:'DM Mono',monospace;font-size:26px;color:var(--text-dim);align-self:center;margin-top:18px;}
  .presets{display:flex;gap:5px;flex-wrap:wrap;}
  .preset-btn{flex:1;min-width:48px;padding:7px 2px;font-size:11px;font-weight:500;
    font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text-mid);
    border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:var(--tr);
    text-align:center;letter-spacing:.04em;}
  .threshold-row{display:flex;align-items:center;justify-content:space-between;
    padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
  .threshold-label{font-size:11px;color:var(--text-mid);letter-spacing:.04em;}
  .threshold-controls{display:flex;align-items:center;gap:8px;}
  .threshold-value{font-family:'DM Mono',monospace;font-size:13px;color:var(--warning);min-width:30px;text-align:center;}
  .th-btn{width:26px;height:26px;background:var(--bg);border:1px solid var(--border);border-radius:6px;
    color:var(--text-mid);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  #btn-start{width:100%;padding:15px;font-size:15px;font-weight:500;font-family:'Noto Sans JP',sans-serif;
    background:rgba(79,195,247,.15);color:var(--accent);border:1px solid rgba(79,195,247,.3);
    border-radius:var(--radius);cursor:pointer;transition:var(--tr);letter-spacing:.06em;}

  /* ROOM OVERLAY */
  #room-setup{position:fixed;inset:0;z-index:200;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:32px;}
  #room-setup h1{font-family:'DM Mono',monospace;font-size:20px;font-weight:300;
    color:var(--accent);letter-spacing:.1em;}
  #room-setup p{font-size:12px;color:var(--text-mid);text-align:center;line-height:1.8;}
  .room-input{font-family:'DM Mono',monospace;font-size:22px;font-weight:400;color:var(--text-main);
    text-align:center;letter-spacing:.2em;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:14px 20px;width:100%;max-width:320px;
    -webkit-user-select:auto;user-select:auto;}
  .room-input:focus{outline:none;border-color:var(--accent);}
  .room-btn{width:100%;max-width:320px;padding:14px;font-size:14px;font-weight:500;
    font-family:'Noto Sans JP',sans-serif;border-radius:var(--radius);cursor:pointer;
    transition:var(--tr);letter-spacing:.06em;border:1px solid rgba(79,195,247,.3);
    background:rgba(79,195,247,.15);color:var(--accent);}
  .room-divider{color:var(--text-dim);font-size:11px;letter-spacing:.1em;}

  #setup-panel{display:flex;}
  #running-panel{display:none;}
  body.running #setup-panel{display:none;}
  body.running #running-panel{display:flex;}
</style>
</head>
<body>

<div id="danger-overlay"></div>
<div id="current-clock">--:--:--</div>

<div id="sync-bar">
  <div id="sync-status">
    <div id="sync-dot"></div>
    <span id="sync-label">未接続</span>
  </div>
  <div id="room-info">
    <span style="color:var(--text-dim)">ROOM</span>
    <span id="room-id-display">—</span>
  </div>
</div>

<div id="room-setup">
  <h1>Conference Timer</h1>
  <p>ルームIDを共有することで複数の端末が同期される。<br>新しいルームを作成するか、既存のIDを入力してほしい。</p>
  <button class="room-btn" id="btn-create">＋ 新しいルームを作成</button>
  <div class="room-divider">— または —</div>
  <input class="room-input" id="roomInput" type="text" placeholder="ROOM ID" maxlength="6"
    autocomplete="off" autocapitalize="characters" spellcheck="false">
  <button class="room-btn" id="btn-join">→ このIDで参加</button>
</div>

<div id="app">
  <div id="setup-panel">
    <div class="section-label">タイマーモード</div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btnCD">カウントダウン</button>
      <button class="mode-btn" id="btnCU">カウントアップ</button>
    </div>
    <div class="section-label" style="margin-top:4px">時間設定</div>
    <div class="time-setter">
      <div class="time-inputs">
        <div class="time-unit">
          <div class="unit-label">分</div>
          <div class="unit-controls">
            <button class="unit-btn" id="minUp">▲</button>
            <input class="unit-value" id="inputMin" type="number" min="0" max="99" value="5" inputmode="numeric">
            <button class="unit-btn" id="minDn">▼</button>
          </div>
        </div>
        <div class="time-sep">:</div>
        <div class="time-unit">
          <div class="unit-label">秒</div>
          <div class="unit-controls">
            <button class="unit-btn" id="secUp">▲</button>
            <input class="unit-value" id="inputSec" type="number" min="0" max="59" value="0" inputmode="numeric">
            <button class="unit-btn" id="secDn">▼</button>
          </div>
        </div>
      </div>
      <div class="presets">
        <button class="preset-btn" data-m="3"  data-s="0">3分</button>
        <button class="preset-btn" data-m="5"  data-s="0">5分</button>
        <button class="preset-btn" data-m="7"  data-s="0">7分</button>
        <button class="preset-btn" data-m="10" data-s="0">10分</button>
        <button class="preset-btn" data-m="15" data-s="0">15分</button>
        <button class="preset-btn" data-m="20" data-s="0">20分</button>
      </div>
    </div>
    <div class="threshold-row">
      <span class="threshold-label">⚠️ 黄色警告（残り）</span>
      <div class="threshold-controls">
        <button class="th-btn" id="thDn">−</button>
        <span class="threshold-value" id="thresholdDisplay">1:00</span>
        <button class="th-btn" id="thUp">＋</button>
      </div>
    </div>
    <button id="btn-start">▶ スタート</button>
  </div>

  <div id="running-panel">
    <div id="mode-indicator">カウントダウン</div>
    <div id="timer-card">
      <div class="overtime-label" id="overtimeLabel">OVERTIME</div>
      <div class="time-display" id="timeDisplay">00:00</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="set-time-label" id="setTimeLabel">設定時間 — : —</div>
    </div>
    <div class="run-btns">
      <button class="run-btn" id="btn-pause-run">⏸ 一時停止</button>
      <button class="run-btn" id="btn-reset-run">↺ リセット</button>
    </div>
    <div id="room-label">ROOM：<span id="room-id-running">—</span></div>
  </div>
</div>

<script>
// ===== Ably設定 =====
var ABLY_KEY = '3OTgBQ.kZvQcQ:yJFBfB3ni2KlaxW7qlRF7la8v5BCcMn8pPPWxXgrs7c';

// ===== State =====
var mode = 'countdown', totalSeconds = 300, warningThreshold = 60;
var intervalId = null, isRunning = false;
var ablyCh = null;
var serverTimeOffset = 0;
var isMaster = false; // true=操作端末 false=表示専用
var timerState = {
  status: 'idle', mode: 'countdown', totalSeconds: 300,
  warningThreshold: 60, startAt: null, pausedAt: null
};

// ===== DOM =====
function $(id){ return document.getElementById(id); }
var timeDisplay   = $('timeDisplay');
var timerCard     = $('timer-card');
var progressFill  = $('progressFill');
var setTimeLabel  = $('setTimeLabel');
var overtimeLabel = $('overtimeLabel');
var modeIndicator = $('mode-indicator');
var btnPauseRun   = $('btn-pause-run');
var thresholdDisp = $('thresholdDisplay');
var inputMin      = $('inputMin');
var inputSec      = $('inputSec');
var dangerOverlay = $('danger-overlay');
var syncDot       = $('sync-dot');
var syncLabel     = $('sync-label');
var clockEl       = $('current-clock');

// ===== Helpers =====
function fmt(sec) {
  var s = Math.abs(Math.floor(sec));
  return ('0'+Math.floor(s/60)).slice(-2)+':'+('0'+(s%60)).slice(-2);
}
function fmtTh(sec){ return Math.floor(sec/60)+':'+('0'+(sec%60)).slice(-2); }
function getSetSecs(){ return (parseInt(inputMin.value)||0)*60+Math.min(parseInt(inputSec.value)||0,59); }
function genRoomId(){
  var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789', r='';
  for(var i=0;i<6;i++) r+=c[Math.floor(Math.random()*c.length)];
  return r;
}
function now(){ return Date.now() + serverTimeOffset; }
function setSyncStatus(state, text){ syncDot.className=state; syncLabel.textContent=text; }

// ===== 現在時刻 =====
function updateClock(){
  var d = new Date();
  clockEl.textContent = ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2);
}
updateClock();
setInterval(updateClock, 1000);

// ===== Display =====
function computeElapsed(){
  if(timerState.status==='running' && timerState.startAt)
    return (now() - timerState.startAt) / 1000;
  if(timerState.status==='paused' && timerState.pausedAt!=null)
    return timerState.pausedAt;
  return 0;
}

function updateDisplay(){
  var ts=timerState.totalSeconds, wt=timerState.warningThreshold,
      m=timerState.mode, elap=computeElapsed();
  var displaySec, state, over;
  if(m==='countdown'){
    var rem=ts-elap; over=rem<=0;
    displaySec=over?-rem:rem;
    state=over?'danger':rem<=wt?'warning':'normal';
  } else {
    over=elap>=ts; displaySec=over?elap-ts:elap;
    state=over?'danger':(ts-elap)<=wt?'warning':'normal';
  }
  timeDisplay.textContent=fmt(displaySec);
  timeDisplay.className='time-display'+(state!=='normal'?' '+state:'');
  timerCard.className='timer-card'+(state!=='normal'?' '+state:'');
  progressFill.className='progress-fill'+(state!=='normal'?' '+state:'');
  overtimeLabel.classList.toggle('visible',over);
  dangerOverlay.classList.toggle('active',state==='danger');
  var pct=0;
  if(m==='countdown') pct=over?0:Math.max(0,(ts-elap)/ts*100);
  else pct=Math.min(elap/ts*100,100);
  progressFill.style.width=pct+'%';
}

function startLocalTick(){ stopLocalTick(); intervalId=setInterval(updateDisplay,500); }
function stopLocalTick(){ if(intervalId){clearInterval(intervalId);intervalId=null;} }

// ===== Ably送信 =====
function publish(data){
  if(!ablyCh) return;
  ablyCh.publish('timer', data, function(err){
    if(err) console.error('Ably publish error:', err);
  });
}

// ===== リモート状態適用 =====
function applyState(data){
  // 数値フィールドを確実に数値に変換（JSON経由で型が変わる場合の対策）
  timerState = {
    status:          data.status,
    mode:            data.mode,
    totalSeconds:    Number(data.totalSeconds),
    warningThreshold:Number(data.warningThreshold),
    startAt:         data.startAt != null ? Number(data.startAt) : null,
    pausedAt:        data.pausedAt != null ? Number(data.pausedAt) : null
  };
  mode = timerState.mode;
  totalSeconds = timerState.totalSeconds;
  warningThreshold = timerState.warningThreshold;

  if(data.status==='running'){
    document.body.classList.add('running');
    var modeLabel = mode==='countdown'?'カウントダウン':'カウントアップ';
    modeIndicator.textContent = isMaster ? modeLabel : modeLabel + '　（表示専用）';
    setTimeLabel.textContent = '設定時間　'+fmt(totalSeconds);
    if(!isRunning){ isRunning=true; startLocalTick(); }
    btnPauseRun.textContent='⏸ 一時停止';
    btnPauseRun.classList.remove('paused');
  } else if(data.status==='paused'){
    document.body.classList.add('running');
    isRunning=false; stopLocalTick(); updateDisplay();
    btnPauseRun.textContent='▶ 再開';
    btnPauseRun.classList.add('paused');
  } else {
    isRunning=false; stopLocalTick();
    dangerOverlay.classList.remove('active');
    document.body.classList.remove('running');
    btnPauseRun.textContent='⏸ 一時停止';
    btnPauseRun.classList.remove('paused');
  }
  updateDisplay();
  setSyncStatus('syncing','受信');
  setTimeout(function(){ setSyncStatus('connected','同期中'); }, 600);
}

// ===== Ablyルーム接続 =====
function enterRoom(id, master){
  isMaster = !!master;
  $('room-setup').style.display = 'none';
  $('room-id-display').textContent = id;
  $('room-id-running').textContent = id;
  setSyncStatus('syncing','接続中...');
  // 表示専用端末はボタンを非表示
  if(!isMaster){
    $('btn-pause-run').style.display='none';
    $('btn-reset-run').style.display='none';
    $('btn-start').style.display='none';
  }

  // Ably REST APIでサーバー時刻を取得
  fetch('https://rest.ably.io/time', {
    headers: { 'Authorization': 'Basic ' + btoa(ABLY_KEY) }
  }).then(function(r){ return r.json(); })
    .then(function(t){ serverTimeOffset = t[0] - Date.now(); })
    .catch(function(){ serverTimeOffset = 0; });

  // Ablyチャンネルに接続
  var ably = new Ably.Realtime({ key: ABLY_KEY });

  ably.connection.on('connected', function(){
    setSyncStatus('connected','同期中');
  });
  ably.connection.on('disconnected', function(){
    setSyncStatus('error','オフライン');
  });
  ably.connection.on('failed', function(){
    setSyncStatus('error','接続失敗');
  });

  ablyCh = ably.channels.get('timer-room-' + id);

  // 過去の状態を取得（チャンネル履歴）
  ablyCh.history({ limit: 1 }, function(err, page){
    if(!err && page.items.length > 0){
      applyState(page.items[0].data);
    }
  });

  // リアルタイム受信
  ablyCh.subscribe('timer', function(msg){
    applyState(msg.data);
  });
}

// ===== タイマー操作 =====
function startTimer(){
  var ts = getSetSecs(); if(ts<=0) return;
  timerState = {
    status:'running', mode:mode, totalSeconds:Number(ts),
    warningThreshold:Number(warningThreshold),
    startAt: Number(now()), pausedAt: null
  };
  publish(timerState);
  document.body.classList.add('running');
  modeIndicator.textContent = mode==='countdown'?'カウントダウン':'カウントアップ';
  if(!isMaster) modeIndicator.textContent += '　（表示専用）';
  setTimeLabel.textContent = '設定時間　'+fmt(ts);
  totalSeconds=ts; isRunning=true; startLocalTick();
}

function togglePause(){
  if(timerState.status==='running'){
    timerState.status='paused'; timerState.pausedAt=computeElapsed();
    publish(timerState);
    isRunning=false; stopLocalTick(); updateDisplay();
    btnPauseRun.textContent='▶ 再開'; btnPauseRun.classList.add('paused');
  } else if(timerState.status==='paused'){
    timerState.status='running';
    timerState.startAt = now() - timerState.pausedAt*1000;
    timerState.pausedAt = null;
    publish(timerState);
    isRunning=true; startLocalTick();
    btnPauseRun.textContent='⏸ 一時停止'; btnPauseRun.classList.remove('paused');
  }
}

function resetToSetup(){
  stopLocalTick(); isRunning=false;
  dangerOverlay.classList.remove('active');
  document.body.classList.remove('running');
  btnPauseRun.textContent='⏸ 一時停止'; btnPauseRun.classList.remove('paused');
  timerState = {
    status:'idle', mode:mode, totalSeconds:totalSeconds,
    warningThreshold:warningThreshold, startAt:null, pausedAt:null
  };
  publish(timerState);
}

// ===== イベント登録 =====
$('btn-create').addEventListener('click', function(){
  var id=genRoomId(); $('roomInput').value=id; enterRoom(id, true);
});
$('btn-join').addEventListener('click', function(){
  var id=$('roomInput').value.trim().toUpperCase();
  if(id.length>0) enterRoom(id, false);
});
$('roomInput').addEventListener('keydown', function(e){
  if(e.key==='Enter'){ var id=$('roomInput').value.trim().toUpperCase(); if(id.length>0) enterRoom(id, false); }
});
$('btn-start').addEventListener('click', startTimer);
$('btn-pause-run').addEventListener('click', togglePause);
$('btn-reset-run').addEventListener('click', resetToSetup);
$('btnCD').addEventListener('click', function(){ mode='countdown'; $('btnCD').className='mode-btn active'; $('btnCU').className='mode-btn'; });
$('btnCU').addEventListener('click', function(){ mode='countup'; $('btnCD').className='mode-btn'; $('btnCU').className='mode-btn active'; });
$('minUp').addEventListener('click', function(){ inputMin.value=Math.min(99,(parseInt(inputMin.value)||0)+1); });
$('minDn').addEventListener('click', function(){ inputMin.value=Math.max(0,(parseInt(inputMin.value)||0)-1); });
$('secUp').addEventListener('click', function(){ inputSec.value=Math.min(59,(parseInt(inputSec.value)||0)+10); });
$('secDn').addEventListener('click', function(){ inputSec.value=Math.max(0,(parseInt(inputSec.value)||0)-10); });
document.querySelectorAll('.preset-btn').forEach(function(btn){
  btn.addEventListener('click', function(){ inputMin.value=btn.dataset.m; inputSec.value=btn.dataset.s; });
});
$('thUp').addEventListener('click', function(){ warningThreshold=Math.min(300,warningThreshold+30); thresholdDisp.textContent=fmtTh(warningThreshold); });
$('thDn').addEventListener('click', function(){ warningThreshold=Math.max(30,warningThreshold-30); thresholdDisp.textContent=fmtTh(warningThreshold); });

try{
  var ac=new(window.AudioContext||window.webkitAudioContext)();
  document.addEventListener('touchstart',function(){if(ac.state==='suspended')ac.resume();},{once:true});
}catch(e){}
</script>
